SDG_GOAL: >-
  <p>Objetivo 1: Poner fin a la pobreza en todas sus formas y en todo el mundo.</p>
SDG_TARGET: >-
  <p>Meta 1.2: De aquí a 2030, reducir al menos a la mitad la proporción de hombres, mujeres y niños de todas las edades que viven en la pobreza en todas sus dimensiones con arreglo a las definiciones nacionales.</p>
SDG_INDICATOR: >-
  <p>Indicador 1.2.1: Proporción de la población que vive por debajo del umbral nacional de pobreza, desglosada por sexo y edad.</p>
SDG_SERIES_DESCR: >-
  <a href='/site/descargas/fichas/1.2.1.1_1.pdf' target='_blank'>Serie 1.2.1.1_1: Proporción de personas en riesgo de pobreza relativa, considerando el umbral autonómico de pobreza.</a> <br> <a href='/site/descargas/fichas/1.2.1.1.pdf' target='_blank'>Serie 1.2.1.1: Proporción de personas en riesgo de pobreza relativa, considerando el umbral nacional de pobreza.</a> <br> <a href='/site/descargas/fichas/1.2.1.2_1.pdf' target='_blank'>Serie 1.2.1.2_1: Proporción de personas en riesgo de pobreza relativa con alquiler imputado, considerando el umbral autonómico de pobreza.</a> <br> <a href='/site/descargas/fichas/1.2.1.2.pdf' target='_blank'>Serie 1.2.1.2: Proporción de personas en riesgo de pobreza relativa con alquiler imputado, considerando el umbral nacional de pobreza.</a>

